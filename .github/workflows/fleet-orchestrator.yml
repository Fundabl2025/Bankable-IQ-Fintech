# Fleet Orchestrator (ACTIVATED v1)
# Runs every 15 minutes. Reads the spec and blueprint, compares against
# closed issues, opens new issues for gaps, closes stale ones.
name: fleet-orchestrator
on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  issues: write
  pull-requests: read
jobs:
  preflight:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
    outputs:
      paused: ${{ steps.budget.outputs.paused }}
    steps:
      - name: Check FLEET_PAUSED variable
        id: budget
        run: |
          paused="${{ vars.FLEET_PAUSED }}"
          paused="${paused:-false}"
          echo "paused=${paused}" >> "$GITHUB_OUTPUT"
          echo "Fleet paused: ${paused}"
  orchestrator:
    needs: preflight
    if: needs.preflight.outputs.paused != 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Load bot-orchestrator system prompt
        id: prompt
        run: |
          {
            echo 'prompt<<EOFPROMPT'
            cat .github/agents/bot-orchestrator.md
            echo
            echo "## Current task"
            echo "Read docs/blueprint/BANKABLE-Blueprint-v1.8.md and docs/spec/."
            echo "Compare to currently open issues (gh issue list)."
            echo "Open new GitHub Issues for any unimplemented spec section"
            echo "using the .github/ISSUE_TEMPLATE/spec-issue.yml template."
            echo "Cap: 20 new issues per orchestrator cycle."
            echo 'EOFPROMPT'
          } >> "$GITHUB_OUTPUT"
      - name: Run bot-orchestrator via Claude Code
        uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          allowed_tools: "Bash(gh:*),Read,Glob,Grep"
          max_turns: 20
