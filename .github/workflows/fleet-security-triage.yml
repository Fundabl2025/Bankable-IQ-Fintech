# Fleet Security Triage (ACTIVATED v1)
name: fleet-security-triage
on:
  workflow_run:
    workflows: [ci-sast, ci-sca]
    types: [completed]
permissions:
  contents: read
  issues: write
jobs:
  triage:
    if: github.event.workflow_run.conclusion == 'failure' && vars.FLEET_PAUSED != 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_DEFAULT_SONNET_MODEL: claude-sonnet-4-6
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Load bot-security prompt
        id: prompt
        run: |
          {
            echo 'prompt<<EOFPROMPT'
            cat .github/agents/bot-security.md
            echo
            cat .github/agents/_TEMPLATE.md
            echo
            echo "Triage the failed security scan (Semgrep / Snyk / etc)."
            echo "Open issues labeled security for high severity findings."
            echo 'EOFPROMPT'
          } >> "$GITHUB_OUTPUT"
      - name: Triage via Claude Code
        uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          allowed_tools: "Bash(gh:*),Read,Grep"
          max_turns: 10
