name: fleet-security-triage
on:
  workflow_run:
    workflows: [ci-sast, ci-sca]
    types: [completed]
permissions:
  contents: read
  issues: write
jobs:
  triage:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Spawn bot-security
        run: |
          echo "bot-security triaging SAST/SCA findings"
          echo "System prompt: .github/agents/bot-security.md"
