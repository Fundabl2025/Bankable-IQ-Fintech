# Fleet Reviewer (ACTIVATED v1)
name: fleet-reviewer
on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
permissions:
  contents: read
  pull-requests: write
jobs:
  reviewer:
    if: github.event.pull_request.user.login != 'bankable-fleet[bot]' && vars.FLEET_PAUSED != 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      model: claude-sonnet-4-6
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
      - name: Load bot-reviewer system prompt
        id: prompt
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          {
            echo 'prompt<<EOFPROMPT'
            cat .github/agents/bot-reviewer.md
            echo
            cat .github/agents/_TEMPLATE.md
            echo
            echo "## PR you are reviewing"
            echo "Number: #${PR_NUM}"
            echo "Title: ${PR_TITLE}"
            echo "Use gh CLI to inspect the diff, check tests, and post a review comment."
            echo 'EOFPROMPT'
          } >> "$GITHUB_OUTPUT"
      - name: Review PR via Claude Code
        uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          allowed_tools: "Bash(gh:*),Read,Grep,Glob"
          max_turns: 15
