name: Bug
description: Something is broken in a deployed surface
title: "[bug] <symptom>"
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
