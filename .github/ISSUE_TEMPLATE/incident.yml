name: Production incident
description: Production is degraded or down
title: "[incident][SEV<1-4>] <summary>"
labels: ["incident"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: ["SEV-1", "SEV-2", "SEV-3", "SEV-4"]
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Customer impact
    validations:
      required: true
  - type: textarea
    id: status
    attributes:
      label: Current status
